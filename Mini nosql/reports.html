<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - CompanyPro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-building"></i>
            <span>CompanyPro</span>
        </div>
        
        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="employees.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Employees</span>
            </a>
            <a href="departments.html" class="nav-item">
                <i class="fas fa-building"></i>
                <span>Departments</span>
            </a>
            <a href="reports.html" class="nav-item active">
                <i class="fas fa-chart-bar"></i>
                <span>Reports</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="admin-profile">
                <div class="admin-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="admin-info">
                    <div class="admin-name">Admin User</div>
                    <div class="admin-role">Administrator</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="header-left">
                <button class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">Reports</h1>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search reports...">
                </div>
                <button class="notification-btn">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </button>
                <a href="index.html" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </header>

        <!-- Content -->
        <div class="content-container">
            <!-- Report Options -->
            <div class="card">
                <div class="card-header">
                    <h3>Generate Reports</h3>
                </div>
                <div class="card-body">
                    <div class="report-options">
                        <button class="report-btn" onclick="generateEmployeeReport()">
                            <i class="fas fa-users"></i>
                            <span>Employee Report</span>
                            <p>Complete list of all employees with details</p>
                        </button>

                        <button class="report-btn" onclick="generateDepartmentReport()">
                            <i class="fas fa-building"></i>
                            <span>Department Report</span>
                            <p>Department-wise employee distribution</p>
                        </button>

                        <button class="report-btn" onclick="generateSalaryReport()">
                            <i class="fas fa-money-bill-wave"></i>
                            <span>Salary Report</span>
                            <p>Salary breakdown and payroll summary</p>
                        </button>

                        <button class="report-btn" onclick="generateAttendanceReport()">
                            <i class="fas fa-calendar-check"></i>
                            <span>Attendance Report</span>
                            <p>Employee attendance and leave status</p>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Recent Reports -->
            <div class="card">
                <div class="card-header">
                    <h3>Recent Reports</h3>
                </div>
                <div class="card-body">
                    <div class="recent-reports">
                        <div class="empty-state">
                            <i class="fas fa-file-alt"></i>
                            <p>No recent reports. Generate a report to get started.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
  <script src="js/api.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
